# Clippy configuration for SPECTER.
#
# Note: This file only supports *Clippy configuration options* (thresholds,
# allow/deny lists, etc). It does not enable/disable lints by name. Control lint
# levels via `cargo clippy -- -W/-D clippy::...` or crate-level attributes.

# Keep this off for hackathon iteration; revisit for releases.
avoid-breaking-exported-api = false

# Project-level policy lists.
disallowed-types = []
disallowed-methods = []

# Reasonable defaults for a fast-moving codebase.
too-many-arguments-threshold = 7
too-many-lines-threshold = 2000
type-complexity-threshold = 300
enum-variant-size-threshold = 200
large-error-threshold = 128
