option-as-ref-deref = true
option-env-unwrap = true
option-if-let-else = true
option-option = true
or-fun-call = true
path-buf-push-overwrite = true
pattern-type-mismatch = true
precedence = true
print-stdout = true
print-with-newline = true
pub-use = true
question-mark-used = true
range-minus-one = true
range-plus-one = true
range-step-by-zero = true
range-zip-with-len = true
ref-bind-to-reference = true
