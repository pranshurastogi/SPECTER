search-is-some = true
semicolon-if-nothing-returned = true
skip-while-next = true
slow-vector-initialization = true
stable-features = true
suboptimal-flops = true
suspicious-arithmetic = true
suspicious-assignment = true
suspicious-else-formatting = true
suspicious-map = true
suspicious-op-assign = true
suspicious-splitn = true
suspicious-unary-op = true
suspicious-xor-used-as-pow = true
temporary-assignment = true
toplevel-ref-arg = true
type-repetition-in-bounds = true
unclear-operation-precedence = true
unconditional-recursion = true
unimplemented = true
