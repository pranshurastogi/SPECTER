name: Security Audit

on:
  push:
    branches: [main, staging]
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
      - ".github/workflows/security-audit.yml"
  pull_request:
    branches: [main, staging]
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: specter
        # RUSTSEC-2026-{0049,0098,0099,0104}: rustls-webpki 0.102.x via libsql 0.9.x (Turso SDK).
        # libsql has not yet released a 0.9.x build on rustls 0.23+; suppressed until libsql 0.10 is stable.
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104
