name: Frontend CI

on:
  push:
    branches: [main, staging]
    paths:
      - "SPECTER-web/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main, staging]
    paths:
      - "SPECTER-web/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: SPECTER-web

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_API_BASE_URL: https://backend.specterpq.com
          VITE_ETH_RPC_URL: https://ethereum.publicnode.com
          VITE_DYNAMIC_ENVIRONMENT_ID: ci-placeholder
          VITE_USE_TESTNET: "false"
