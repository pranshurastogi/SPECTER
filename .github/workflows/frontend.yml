name: Frontend CI

on:
  push:
    branches: ["main", "staging", "production"]
    paths:
      - "SPECTER-web/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: ["main", "staging", "production"]
    paths:
      - "SPECTER-web/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: SPECTER-web

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: SPECTER-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: SPECTER-web/package-lock.json
      - run: npm ci
      - run: npm test

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: SPECTER-web/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://backend.specterpq.com
          VITE_ETH_RPC_URL: https://ethereum.publicnode.com
          VITE_DYNAMIC_ENVIRONMENT_ID: ci-placeholder
          VITE_USE_TESTNET: "false"
