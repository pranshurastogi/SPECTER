steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/specter/specter-api:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/specter/specter-api:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/specter/specter-api']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'specter-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/specter/specter-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300s'
      - '--set-secrets=USE_TESTNET=USE_TESTNET:latest,ETH_RPC_URL=ETH_RPC_URL:latest,PINATA_GATEWAY_URL=PINATA_GATEWAY_URL:latest,PINATA_GATEWAY_TOKEN=PINATA_GATEWAY_TOKEN:latest,PINATA_JWT=PINATA_JWT:latest,ENABLE_CACHE=ENABLE_CACHE:latest,PRIVATE_KEY=PRIVATE_KEY:latest,ALCHEMY_RPC_URL=ALCHEMY_RPC_URL:latest,PINATA_API_KEY=PINATA_API_KEY:latest,PINATA_SECRET_KEY=PINATA_SECRET_KEY:latest,YELLOW_WS_URL=YELLOW_WS_URL:latest,YELLOW_CUSTODY_ADDRESS=YELLOW_CUSTODY_ADDRESS:latest,YELLOW_ADJUDICATOR_ADDRESS=YELLOW_ADJUDICATOR_ADDRESS:latest,YELLOW_CHAIN_ID=YELLOW_CHAIN_ID:latest,ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest,REGISTRY_BACKEND=REGISTRY_BACKEND:latest,TURSO_DATABASE_URL=TURSO_DATABASE_URL:latest,TURSO_AUTH_TOKEN=TURSO_AUTH_TOKEN:latest,RATE_LIMIT_RPS=RATE_LIMIT_RPS:latest,RATE_LIMIT_BURST=RATE_LIMIT_BURST:latest,MAX_BODY_SIZE=MAX_BODY_SIZE:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/specter/specter-api:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/specter/specter-api:latest'
